<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News</title>

    <link rel="stylesheet" href="style.css">
    
<link rel="stylesheet" href="news_page.css">

</head>

<body>
    
    
    <main>
        
<div class="header-div">

    <div class="club-name text inline">
        <a href="index.html">
            <img src="static/images/Club_logo.png" class="club-logo">
        </a>
    </div>

    <div class="header-options inline">
        <a class="text header-links" href="our_team.html">Our Team</a>
        <a class="text header-links" href="about_us.html">About Us</a>
        <a class="text header-links" href="news_page.html">Club News</a>
        <a class="text header-links" href="students_page.html"><span class="gold">For Students</span></a>
        <a class="text header-links" href="clients_page.html"><span class="gold">For Clients</span></a>
    </div>

</div>


<!-- SUBSCRIBE -->
<div class="subscribe-section">
    <h2 class="subscribe-heading text">
        Subscribe to our <span class="gold italize">Newsletter</span>.
    </h2>

    <form class="subscribe-form">
        <input type="email" class="subscribe-input" placeholder="Email address" required>
        <button type="submit" class="subscribe-button" aria-label="Subscribe">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 12h15M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </form>
</div>


<!-- NEWS / PODCASTS / ACHIEVEMENTS -->
<div class="news-section">
    <p class="wwd-label text gold">Stay Up To Date</p>
    <h2 class="news-heading hero-text">
        Our latest news, <span class="gold italize">conversations</span>, and wins.
    </h2>

    <div class="news-grid">

        <a href="#" class="news-card">
            <div class="news-thumb news-thumb-news"></div>
            <p class="news-title text">Club News <span class="gold">&rsaquo;</span></p>
        </a>

        <a href="#" class="news-card">
            <div class="news-thumb news-thumb-podcast"></div>
            <p class="news-title text">Podcasts &amp; Interviews <span class="gold">&rsaquo;</span></p>
        </a>

        <a href="achievements_page.html" class="news-card">
            <div class="news-thumb news-thumb-achievements"></div>
            <p class="news-title text">Achievements <span class="gold">&rsaquo;</span></p>
        </a>

    </div>
</div>

    </main>
    
    
    
</body>
</html>
